<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="premium-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"></feDropShadow>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"></feDropShadow>
    </filter>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9D00"></stop>
      <stop offset="20%" stop-color="#FF7A00"></stop>
      <stop offset="100%" stop-color="#CC5200"></stop>
    </linearGradient>
    <linearGradient id="dark-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555A66"></stop>
      <stop offset="15%" stop-color="#363A44"></stop>
      <stop offset="100%" stop-color="#1B1D22"></stop>
    </linearGradient>
    <linearGradient id="bridge-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"></stop>
      <stop offset="100%" stop-color="#CC5200"></stop>
    </linearGradient>
    <polygon id="dark-hex" points="0,-34 29.445,-17 29.445,17 0,34 -29.445,17 -29.445,-17" fill="url(#dark-grad)" filter="url(#premium-shadow)"></polygon>
    <polygon id="center-hex" points="0,-34 29.445,-17 29.445,17 0,34 -29.445,17 -29.445,-17" fill="url(#orange-grad)" stroke="#FF8C1A" stroke-width="1.5" filter="url(#premium-shadow)"></polygon>
    <g id="bridge">
      <rect x="-6" y="-120" width="12" height="120" fill="url(#bridge-grad)" filter="url(#premium-shadow)"></rect>
    </g>
  </defs>
  <g transform="translate(0, 0)">
    <use href="#dark-hex" transform="translate(325.28, 256)"></use>
    <use href="#dark-hex" transform="translate(290.64, 316)"></use>
    <use href="#dark-hex" transform="translate(221.36, 316)"></use>
    <use href="#dark-hex" transform="translate(186.72, 256)"></use>
    <use href="#dark-hex" transform="translate(221.36, 196)"></use>
    <use href="#dark-hex" transform="translate(290.64, 196)"></use>
    <use href="#dark-hex" transform="translate(394.56, 256)"></use>
    <use href="#dark-hex" transform="translate(325.28, 376)"></use>
    <use href="#dark-hex" transform="translate(186.72, 376)"></use>
    <use href="#dark-hex" transform="translate(117.44, 256)"></use>
    <use href="#dark-hex" transform="translate(186.72, 136)"></use>
    <use href="#dark-hex" transform="translate(325.28, 136)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(0)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(60)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(120)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(180)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(240)"></use>
    <use href="#bridge" transform="translate(256, 256) rotate(300)"></use>
    <use href="#center-hex" transform="translate(256, 136)"></use>
    <use href="#center-hex" transform="translate(359.92, 196)"></use>
    <use href="#center-hex" transform="translate(359.92, 316)"></use>
    <use href="#center-hex" transform="translate(256, 376)"></use>
    <use href="#center-hex" transform="translate(152.08, 316)"></use>
    <use href="#center-hex" transform="translate(152.08, 196)"></use>
    <use href="#center-hex" transform="translate(256, 256)"></use>
  </g>
</svg>