services:
  proxmox-hive:
    build: .
    container_name: proxmox-hive
    ports:
      - "3000:3000"
    volumes:
      - proxmox-hive-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    environment:
      - NODE_ENV=production

volumes:
  proxmox-hive-data:
